<!DOCTYPE html>
<head>
<title>MMU InfoHUB – Profile</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  .profile-wrapper {
    margin: 30px 28px;
    margin-right: 330px;
    margin-top: 470px;
  }

  .profile-header {
    display: flex;
    align-items: center;
    gap: 24px;
    border: solid #333333;
    padding: 28px 24px;
    margin-bottom: 32px;
    background-color: #f8f5f3;
  }

  .profile-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background-color: #333333;
    color: #f8f5f3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .profile-details h2 {
    font-size: 28px;
    color: #333333;
    margin-bottom: 4px;
    background: transparent;
    height: auto;
    padding: 0;
    position: static;
    display: block;
    animation: none;
  }

  .profile-details p {
    font-size: 14px;
    color: #555;
    padding: 0;
    margin: 0;
  }

  .profile-details .email-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border: solid 1.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .email-badge.mmu { border-color: #2980b9; color: #2980b9; }
  .email-badge.gmail { border-color: #e67e22; color: #e67e22; }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background-color: #333333;
    color: #f8f5f3;
    display: inline-block;
    padding: 4px 14px;
    margin-bottom: 16px;
    margin-top: 32px;
  }

  .history-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    margin-top: 32px;
  }

  .tab-btn {
    padding: 10px 24px;
    border: solid #333333;
    background-color: #f8f5f3;
    color: #333333;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    width: auto;
  }

  .tab-btn:hover, .tab-btn.active {
    background-color: #333333;
    color: #f8f5f3;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .history-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border: solid #333333;
    border-top: none;
    padding: 14px 18px;
    background-color: #f8f5f3;
    gap: 16px;
  }

  .history-row:first-child { border-top: solid #333333; }

  .history-row a {
    font-size: 15px;
    font-weight: 600;
    color: #333333;
  }

  .history-row a:hover { text-decoration: underline; }

  .history-row .row-meta {
    font-size: 12px;
    color: #888;
    padding: 0;
    margin: 4px 0 0 0;
  }

  .history-row .row-excerpt {
    font-size: 13px;
    color: #555;
    padding: 0;
    margin: 6px 0 0 0;
  }

  .history-date {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    flex-shrink: 0;
    padding: 0;
    margin: 0;
  }

  .empty-msg {
    font-size: 14px;
    color: #888;
    padding: 16px 0;
    margin: 0;
  }

  @media (max-width: 768px) {
    .profile-wrapper { margin: 16px; margin-top: 20px; }
    .history-tabs { flex-wrap: wrap; }
    .history-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
    <h1>MMU InfoHUB</h1>
</header>

<div class="navigationBar">
<ul><br>
    <li><a href="index.html">HOME</a></li><br>
    <li><a href="board.html">BOARD</a></li><br>
    <li><a href="profile.html">PROFILE</a></li><br>
    <li><a href="Login.html">LOGOUT (FIXING) </a></li><br>
    <li style="font-size: x-small;">Copyright &#169; 2026 Mini IT Project G067</li>
</ul>
</div>

<div id="task"><h2>PROFILE</h2></div>

<div class="profile-wrapper">

    <!-- PROFILE HEADER -->
    <div class="profile-header">
        <div class="profile-avatar">U</div>
        <div class="profile-details">
            <h2></h2>
            <p></p>
            <!-- email badge: swap class to 'mmu' once they update their email -->
            <span class="email-badge gmail">GMAIL — PENDING MMU EMAIL</span>
        </div>
    </div>

    <!-- TABS -->
    <div class="history-tabs">
        <button class="tab-btn active" onclick="switchTab('posts')">POSTS</button>
        <button class="tab-btn" onclick="switchTab('comments')">COMMENTS</button>
    </div>

    <!-- POSTS TAB -->
    <div class="tab-panel active" id="tab-posts">

        <div class="history-row">
            <div>
                <a href="post.html?id="></a>
                <p class="row-meta">post 1 <strong></strong></p>
                <p class="row-excerpt"></p>
            </div>
            <p class="history-date"></p>
        </div>

        <div class="history-row">
            <div>
                <a href="post.html?id="></a>
                <p class="row-meta">post 2 <strong></strong></p>
                <p class="row-excerpt"></p>
            </div>
            <p class="history-date"></p>
        </div>

        <div class="history-row">
            <div>
                <a href="post.html?id="></a>
                <p class="row-meta">post 3 <strong></strong></p>
                <p class="row-excerpt"></p>
            </div>
            <p class="history-date"></p>
        </div>

    </div>

    <!-- COMMENTS TAB -->
    <div class="tab-panel" id="tab-comments">

        <div class="history-row">
            <div>
                <p class="row-meta">comment 1 <a href="post.html?id="></a></p>
                <p class="row-excerpt"></p>
            </div>
            <p class="history-date"></p>
        </div>

        <div class="history-row">
            <div>
                <p class="row-meta">comment 2 <a href="post.html?id="></a></p>
                <p class="row-excerpt"></p>
            </div>
            <p class="history-date"></p>
        </div>

        <div class="history-row">
            <div>
                <p class="row-meta">comment 3 <a href="post.html?id="></a></p>
                <p class="row-excerpt"></p>
            </div>
            <p class="history-date"></p>
        </div>

    </div>
</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
  }
</script>

</body>
</html>
