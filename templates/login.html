<!DOCTYPE html>
<html>
<head>
  <title>MMU InfoHUB – Login</title>
  <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
<script>
  /* Auto scroll down */
window.addEventListener('load', function() {
  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: 'smooth'
  });
});
</script>
</head>
<body>

<header>
  <h1>MMU InfoHUB</h1>
</header>

<div class="login-center">
  <form method="POST" action="{{ url_for('login') }}" id="login-form">
    <div class="login-box">
    <h2>LOGIN</h2>
    {% include "flash.html" %}
    <label for="l-user">Username</label>
    <input type="text" id="l-user" name="username" placeholder="Enter username" required/>
    
    <label for="l-pass">Password</label>
    <input type="password" id="l-pass" name="password" placeholder="Enter password" required/>
    
    <button class="btn-main" type="submit">LOGIN</button>
    
    <div class="sub-links">
      <a href="{{ url_for('index') }}" class="btn-link">Back to Home</a>
      <a href="{{ url_for('forgotPass') }}" class="btn-link">Forgot password / username?</a>
      <a href="{{ url_for('signup') }}" class="btn-link">Sign up</a>
    </div>
    </div>
  </form>
</div>

</body>
</html>
