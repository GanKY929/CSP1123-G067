<!DOCTYPE html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMU InfoHUB – Contact</title>
<link rel="stylesheet" href="/static/darkModeStyle.css">
<style>
form, label, input, u, form h1, textarea {
    background-color: #f8f5f3;
    color: #333333;
    animation: darkToWhite;
    animation-duration: 2s;
}
form { padding: 150px; }
label, input, textarea { font-size: large; font-weight: bold; }
input { width: 250px; }
input, textarea {
    font-family: handwriting, corsiva;
    font-style: italic;
    padding-left: 5px;
    border-top: 0;
    border-right: 0;
    border-left: solid #333333;
    border-bottom: solid #333333;
}
input:focus, textarea:focus { outline: none; }
h4 { background-color: #f8f5f3; color: #333333; animation: none; }
div.credit { background-color: #333333; display: block; color: #f8f5f3; font-size: 13px; margin-bottom: 20px; }
div.credit ul li { margin-left: 20px; color: #f8f5f3; background-color: #333333; font-size: 13px; }
div.credit ul { background-color: #333333; }
.popup {
    display: none;
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #333333;
    color: #f8f5f3;
    padding: 16px 32px;
    font-size: 15px;
    font-weight: 600;
    z-index: 999;
    border: solid #f8f5f3;
}
.popup.show { display: block; }
</style>
</head>
<body>

<div class="popup" id="popup">Form submitted successfully!</div>

<header>
    <h1>REPORT ANY ISSUES</h1>
</header>

<div class="navigationBar">
<ul><br>
    <li><a href="/">HOME</a></li><br>
    <li><a href="/profile">PROFILE</a></li><br>
    <li><a href="#">QUEST BOARD</a></li><br>
    <li><a href="/contact">CONTACT</a></li><br>
    <li style="font-size: x-small;">Copyright &#169; 2026 Mini IT Project G067</li>
</ul>
</div>

<div id="task">
<h2>CONTACT</h2>
</div>

<div class="content">
    <h2 id="subtask">FILL UP YOUR FORM HERE</h2>
<form action="https://formsubmit.co/kygan438@gmail.com" method="POST">
    <input type="hidden" name="_next" value="{{ request.host_url }}contact?submitted=true">
    <input type="hidden" name="_captcha" value="false">

    <h1 style="text-align: center;">FEEDBACK FORM</h1><br><br>
    <label for="info"><u>PERSONAL INFORMATION</u></label><br><br>

    <label for="name">NAME :</label>
    <input type="text" name="name" id="Name">
    <input type="date" name="Date" id="date" style="float:right;margin-right:50px;">
    <label for="date" style="float:right;">DATE :</label><br><br><br>

    <label for="email">EMAIL :</label>
    <input type="email" name="Email" id="email"><br><br><br><br>

    <label for="details"><u>COMMENT</u></label><br><br>
    <textarea id="details" name="Comment" style="resize:vertical;width:700px;min-height:200px;margin-left:15px;"></textarea><br><br><br>

    <button type="submit" style="margin-left:375px;padding:5px 15px;background-color:#333333;color:#f8f5f3;">SUBMIT</button>
</form>

</div>

<script>
    var params = new URLSearchParams(window.location.search);
    if (params.get('submitted') === 'true') {
        var popup = document.getElementById('popup');
        popup.classList.add('show');
        setTimeout(function() {
            popup.classList.remove('show');
        }, 3000);
    }
</script>

</body>
</html>
